<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cd4fd"/>
      <stop offset="100%" stop-color="#a8e4ff"/>
    </linearGradient>
  </defs>
  <!-- Sparkle left -->
  <g opacity="0.7">
    <line x1="12" y1="10" x2="12" y2="22" stroke="#fef08a" stroke-width="2" stroke-linecap="round"/>
    <line x1="6" y1="16" x2="18" y2="16" stroke="#fef08a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Sparkle top -->
  <g opacity="0.5">
    <line x1="50" y1="4" x2="50" y2="12" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="46" y1="8" x2="54" y2="8" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Main text -->
  <text x="30" y="42" font-family="'Rounded Mplus 1c', 'Nunito', sans-serif" font-size="36" font-weight="700" fill="url(#logoGrad)" letter-spacing="2">MIRAI</text>
  <text x="160" y="42" font-family="'Rounded Mplus 1c', 'Nunito', sans-serif" font-size="36" font-weight="700" fill="#f9a8d4" letter-spacing="2">ME</text>
  <!-- Dash between -->
  <line x1="150" y1="34" x2="158" y2="34" stroke="#e9d5ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Small star right -->
  <g opacity="0.6">
    <polygon points="240,12 242,18 248,18 243,22 245,28 240,24 235,28 237,22 232,18 238,18" fill="#fef08a"/>
  </g>
  <!-- Sparkle bottom right -->
  <g opacity="0.4">
    <line x1="230" y1="48" x2="230" y2="54" stroke="#bbf7d0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="227" y1="51" x2="233" y2="51" stroke="#bbf7d0" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Subtitle -->
  <text x="32" y="56" font-family="'Rounded Mplus 1c', 'Nunito', sans-serif" font-size="9" fill="#292524" opacity="0.5" letter-spacing="4">AI PERSONALIZED STORYBOOK</text>
</svg>