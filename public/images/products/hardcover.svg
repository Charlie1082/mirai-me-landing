<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <defs>
    <linearGradient id="hardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#fef08a"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <!-- Soft background -->
  <rect x="0" y="0" width="200" height="260" rx="20" fill="#e9d5ff" opacity="0.06"/>

  <!-- Book shadow -->
  <ellipse cx="105" cy="225" rx="65" ry="10" fill="#292524" opacity="0.06"/>

  <!-- Hardcover book - thick spine -->
  <!-- Book pages (side) -->
  <rect x="48" y="45" width="108" height="156" rx="3" fill="#fefdfb" stroke="#e9d5ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Page edges -->
  <line x1="155" y1="52" x2="155" y2="195" stroke="#292524" stroke-width="0.5" stroke-opacity="0.06"/>

  <!-- Hard cover -->
  <rect x="40" y="38" width="115" height="162" rx="5" fill="url(#hardGrad)" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Spine -->
  <rect x="40" y="38" width="12" height="162" rx="5" fill="#c4b5fd" opacity="0.4"/>

  <!-- Gold border frame on cover -->
  <rect x="58" y="50" width="88" height="138" rx="4" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 2"/>

  <!-- Cover illustration -->
  <rect x="64" y="58" width="76" height="70" rx="6" fill="#fefdfb" opacity="0.5"/>
  <!-- Night sky scene (premium feel) -->
  <rect x="64" y="58" width="76" height="40" rx="6" fill="#c4b5fd" opacity="0.2"/>
  <!-- Moon -->
  <circle cx="118" cy="72" r="10" fill="#fef08a" opacity="0.5"/>
  <circle cx="122" cy="69" r="8" fill="#e9d5ff" opacity="0.4"/>
  <!-- Stars -->
  <polygon points="80,68 81,71 84,71 82,73 83,76 80,74 77,76 78,73 76,71 79,71" fill="#fef08a" opacity="0.6"/>
  <polygon points="95,64 96,66 98,66 97,68 97,70 95,69 93,70 93,68 92,66 94,66" fill="#fef08a" opacity="0.5"/>
  <circle cx="105" cy="70" r="1" fill="#fef08a" opacity="0.4"/>
  <!-- Castle silhouette -->
  <path d="M75 118 L75 105 L78 105 L78 100 L80 100 L80 105 L90 105 L90 96 L93 96 L93 105 L105 105 L105 100 L108 100 L108 105 L118 105 L118 98 L121 98 L121 105 L125 105 L125 118 Z" fill="#e9d5ff" opacity="0.35"/>
  <!-- Castle windows -->
  <rect x="83" y="108" width="4" height="5" rx="2" fill="#fef08a" opacity="0.3"/>
  <rect x="100" y="108" width="4" height="5" rx="2" fill="#fef08a" opacity="0.3"/>
  <rect x="113" y="108" width="4" height="5" rx="2" fill="#fef08a" opacity="0.3"/>

  <!-- Gold title decorations -->
  <rect x="70" y="138" width="64" height="5" rx="2" fill="url(#goldGrad)" opacity="0.5"/>
  <rect x="78" y="148" width="48" height="3" rx="1.5" fill="url(#goldGrad)" opacity="0.35"/>
  <!-- Gold ornament -->
  <path d="M94 162 Q100 156 106 162" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="100" cy="158" r="2" fill="url(#goldGrad)" opacity="0.5"/>

  <!-- Gift ribbon wrapping -->
  <rect x="92" y="38" width="12" height="162" rx="0" fill="url(#ribbonGrad)" opacity="0.25"/>
  <rect x="40" y="108" width="115" height="12" rx="0" fill="url(#ribbonGrad)" opacity="0.25"/>
  <!-- Ribbon bow -->
  <ellipse cx="93" cy="108" rx="12" ry="8" fill="#f9a8d4" opacity="0.4" transform="rotate(-15, 93, 108)"/>
  <ellipse cx="107" cy="108" rx="12" ry="8" fill="#f9a8d4" opacity="0.4" transform="rotate(15, 107, 108)"/>
  <circle cx="100" cy="110" r="5" fill="#f9a8d4" opacity="0.5"/>

  <!-- Premium sparkles -->
  <g opacity="0.6">
    <polygon points="170,55 171.5,60 176.5,60 172.5,63 174,68 170,65 166,68 167.5,63 163.5,60 168.5,60" fill="#fef08a"/>
  </g>
  <g opacity="0.4">
    <line x1="25" y1="65" x2="25" y2="71" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="68" x2="28" y2="68" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <circle cx="178" cy="160" r="2.5" fill="#f9a8d4" opacity="0.3"/>
  <circle cx="22" cy="170" r="2" fill="#bbf7d0" opacity="0.3"/>

  <!-- Label -->
  <text x="100" y="248" text-anchor="middle" font-family="'Nunito', sans-serif" font-size="11" fill="#c4b5fd" opacity="0.7">Premium Hardcover</text>
</svg>