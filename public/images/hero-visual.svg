<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cd4fd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="magicGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#e9d5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7cd4fd" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="250" cy="230" r="180" fill="url(#glowGrad)"/>

  <!-- Clouds background -->
  <g opacity="0.3">
    <ellipse cx="80" cy="120" rx="60" ry="25" fill="#7cd4fd"/>
    <ellipse cx="60" cy="115" rx="35" ry="20" fill="#a8e4ff"/>
    <ellipse cx="420" cy="100" rx="50" ry="22" fill="#7cd4fd"/>
    <ellipse cx="440" cy="95" rx="30" ry="18" fill="#a8e4ff"/>
    <ellipse cx="380" cy="380" rx="45" ry="18" fill="#bbf7d0" opacity="0.5"/>
  </g>

  <!-- Open book -->
  <g filter="url(#softShadow)">
    <!-- Book spine shadow -->
    <ellipse cx="250" cy="370" rx="140" ry="12" fill="#292524" opacity="0.06"/>
    <!-- Left page -->
    <path d="M250 280 Q248 200 130 190 Q110 190 108 210 L108 340 Q108 355 125 355 L240 355 Q250 355 250 345 Z" fill="#fefdfb" stroke="#e9d5ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M250 280 Q252 200 370 190 Q390 190 392 210 L392 340 Q392 355 375 355 L260 355 Q250 355 250 345 Z" fill="#fefdfb" stroke="#7cd4fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Book spine -->
    <line x1="250" y1="195" x2="250" y2="355" stroke="#e9d5ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <!-- Page lines left -->
    <line x1="140" y1="240" x2="230" y2="240" stroke="#e9d5ff" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="140" y1="260" x2="220" y2="260" stroke="#e9d5ff" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="140" y1="280" x2="225" y2="280" stroke="#e9d5ff" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <line x1="140" y1="300" x2="210" y2="300" stroke="#e9d5ff" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <!-- Small illustration on right page -->
    <circle cx="330" cy="270" r="30" fill="#bbf7d0" opacity="0.3"/>
    <circle cx="320" cy="260" r="8" fill="#f9a8d4" opacity="0.4"/>
    <circle cx="340" cy="265" r="6" fill="#fef08a" opacity="0.4"/>
  </g>

  <!-- Magic rising from book - child silhouette -->
  <g opacity="0.85">
    <!-- Magic aura -->
    <ellipse cx="250" cy="180" rx="70" ry="90" fill="url(#magicGrad)"/>
    <!-- Child silhouette -->
    <g fill="#7cd4fd" opacity="0.7">
      <!-- Head -->
      <circle cx="250" cy="140" r="22"/>
      <!-- Body -->
      <path d="M235 158 Q230 180 228 200 Q228 210 250 210 Q272 210 272 200 Q270 180 265 158 Z"/>
      <!-- Arms reaching up -->
      <path d="M228 170 Q215 155 210 145" stroke="#7cd4fd" stroke-width="6" stroke-linecap="round" fill="none"/>
      <path d="M272 170 Q285 155 290 145" stroke="#7cd4fd" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- Hair (ponytail style) -->
      <path d="M235 125 Q230 110 240 105 Q250 102 260 105 Q270 110 265 125" fill="#7cd4fd"/>
      <path d="M262 115 Q275 108 278 120" fill="#7cd4fd" opacity="0.8"/>
    </g>
  </g>

  <!-- Floating magical elements -->
  <!-- Stars -->
  <g opacity="0.8">
    <polygon points="160,100 163,110 173,110 165,116 168,126 160,120 152,126 155,116 147,110 157,110" fill="#fef08a"/>
    <polygon points="340,80 342,87 349,87 343,91 345,98 340,94 335,98 337,91 331,87 338,87" fill="#fef08a" opacity="0.7"/>
    <polygon points="300,130 301,134 305,134 302,137 303,141 300,138 297,141 298,137 295,134 299,134" fill="#fef08a" opacity="0.5"/>
    <polygon points="190,160 191,164 195,164 192,167 193,171 190,168 187,171 188,167 185,164 189,164" fill="#fef08a" opacity="0.6"/>
  </g>

  <!-- Hearts -->
  <g opacity="0.5">
    <path d="M120,170 Q120,162 128,162 Q136,162 136,172 L128,182 L120,172 Z" fill="#f9a8d4" transform="rotate(-15, 128, 172)"/>
    <path d="M370,140 Q370,134 376,134 Q382,134 382,142 L376,150 L370,142 Z" fill="#f9a8d4" opacity="0.6" transform="rotate(10, 376, 142)"/>
  </g>

  <!-- Small sparkles -->
  <g stroke="#fef08a" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="180" y1="90" x2="180" y2="98"/>
    <line x1="176" y1="94" x2="184" y2="94"/>
    <line x1="320" y1="105" x2="320" y2="111"/>
    <line x1="317" y1="108" x2="323" y2="108"/>
    <line x1="400" y1="200" x2="400" y2="206"/>
    <line x1="397" y1="203" x2="403" y2="203"/>
    <line x1="100" y1="220" x2="100" y2="226"/>
    <line x1="97" y1="223" x2="103" y2="223"/>
  </g>

  <!-- Floating bubbles/circles -->
  <circle cx="130" cy="250" r="8" fill="#e9d5ff" opacity="0.3"/>
  <circle cx="370" cy="230" r="6" fill="#bbf7d0" opacity="0.3"/>
  <circle cx="160" cy="310" r="5" fill="#f9a8d4" opacity="0.2"/>
  <circle cx="350" cy="310" r="7" fill="#7cd4fd" opacity="0.2"/>
  <circle cx="200" cy="120" r="4" fill="#f9a8d4" opacity="0.3"/>
  <circle cx="310" cy="160" r="5" fill="#bbf7d0" opacity="0.25"/>

  <!-- Bottom decoration - small flowers -->
  <g opacity="0.4">
    <circle cx="90" cy="420" r="6" fill="#f9a8d4"/>
    <circle cx="84" cy="414" r="4" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="96" cy="414" r="4" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="90" cy="410" r="3" fill="#f9a8d4" opacity="0.4"/>
    <circle cx="90" cy="420" r="2.5" fill="#fef08a"/>
  </g>
  <g opacity="0.3">
    <circle cx="410" cy="430" r="5" fill="#e9d5ff"/>
    <circle cx="405" cy="425" r="3.5" fill="#e9d5ff" opacity="0.6"/>
    <circle cx="415" cy="425" r="3.5" fill="#e9d5ff" opacity="0.6"/>
    <circle cx="410" cy="430" r="2" fill="#fef08a"/>
  </g>
</svg>