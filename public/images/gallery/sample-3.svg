<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- Starland scene - Yellow/Lavender theme -->
  <defs>
    <linearGradient id="s3night" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Book spread -->
  <rect x="0" y="0" width="280" height="200" rx="10" fill="#fefdfb"/>
  <rect x="0" y="0" width="280" height="200" rx="10" fill="url(#s3night)"/>
  <line x1="140" y1="5" x2="140" y2="195" stroke="#e9d5ff" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Left page - Night sky illustration -->
  <!-- Moon -->
  <circle cx="50" cy="45" r="22" fill="#fef08a" opacity="0.35"/>
  <circle cx="56" cy="40" r="18" fill="#e9d5ff" opacity="0.15"/>
  <!-- Stars scattered -->
  <polygon points="90,30 91.5,35 96.5,35 92.5,38 94,43 90,40 86,43 87.5,38 83.5,35 88.5,35" fill="#fef08a" opacity="0.5"/>
  <polygon points="25,80 26,83 29,83 27,85 28,88 25,86 22,88 23,85 21,83 24,83" fill="#fef08a" opacity="0.4"/>
  <polygon points="110,55 111,58 114,58 112,60 113,63 110,61 107,63 108,60 106,58 109,58" fill="#fef08a" opacity="0.35"/>
  <circle cx="70" cy="65" r="1.5" fill="#fef08a" opacity="0.3"/>
  <circle cx="100" cy="40" r="1" fill="#fef08a" opacity="0.3"/>
  <circle cx="40" cy="70" r="1" fill="#fef08a" opacity="0.25"/>
  <!-- Shooting star -->
  <line x1="80" y1="20" x2="115" y2="35" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <circle cx="80" cy="20" r="2.5" fill="#fef08a" opacity="0.5"/>
  <!-- Cloud/ground -->
  <ellipse cx="70" cy="160" rx="60" ry="20" fill="#e9d5ff" opacity="0.15"/>
  <!-- Child on cloud -->
  <circle cx="65" cy="140" r="7" fill="#f9a8d4" opacity="0.35"/>
  <path d="M58 147 Q58 158 65 158 Q72 158 72 147" fill="#f9a8d4" opacity="0.3"/>
  <!-- Telescope -->
  <line x1="72" y1="145" x2="85" y2="130" stroke="#292524" stroke-width="2" stroke-linecap="round" opacity="0.1"/>
  <circle cx="87" cy="128" r="4" fill="#7cd4fd" opacity="0.2" stroke="#292524" stroke-width="0.5" stroke-opacity="0.1"/>

  <!-- Right page - Text -->
  <rect x="155" y="30" width="100" height="6" rx="3" fill="#e9d5ff" opacity="0.4"/>
  <rect x="155" y="50" width="108" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="62" width="95" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="74" width="105" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="86" width="100" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="98" width="90" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="110" width="108" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="122" width="85" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <!-- Star deco on text page -->
  <polygon points="245,160 246,163 249,163 247,165 248,168 245,166 242,168 243,165 241,163 244,163" fill="#fef08a" opacity="0.3"/>
</svg>