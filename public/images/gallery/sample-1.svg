<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <!-- Forest scene - Green/Mint theme -->
  <defs>
    <linearGradient id="s1sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8e4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bbf7d0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Book spread background -->
  <rect x="0" y="0" width="280" height="200" rx="10" fill="#fefdfb"/>
  <rect x="0" y="0" width="280" height="200" rx="10" fill="url(#s1sky)"/>
  <!-- Book spine -->
  <line x1="140" y1="5" x2="140" y2="195" stroke="#bbf7d0" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Left page - Forest illustration -->
  <!-- Ground -->
  <ellipse cx="70" cy="170" rx="65" ry="15" fill="#bbf7d0" opacity="0.3"/>
  <!-- Trees -->
  <path d="M40 170 L55 110 L70 170 Z" fill="#bbf7d0" opacity="0.5"/>
  <path d="M50 170 L62 120 L74 170 Z" fill="#86efac" opacity="0.3"/>
  <rect x="56" y="155" width="4" height="18" rx="1" fill="#292524" opacity="0.08"/>
  <path d="M85 170 L98 125 L111 170 Z" fill="#bbf7d0" opacity="0.4"/>
  <rect x="95" y="155" width="4" height="18" rx="1" fill="#292524" opacity="0.08"/>
  <!-- Mushrooms -->
  <ellipse cx="45" cy="162" rx="6" ry="3" fill="#f9a8d4" opacity="0.4"/>
  <rect x="43" y="162" width="4" height="6" rx="1" fill="#fefdfb" opacity="0.4"/>
  <!-- Bunny -->
  <ellipse cx="100" cy="158" rx="6" ry="8" fill="#fefdfb" opacity="0.5"/>
  <circle cx="100" cy="148" r="5" fill="#fefdfb" opacity="0.5"/>
  <ellipse cx="97" cy="140" rx="2" ry="6" fill="#fefdfb" opacity="0.4"/>
  <ellipse cx="103" cy="140" rx="2" ry="6" fill="#fefdfb" opacity="0.4"/>
  <circle cx="98" cy="147" r="1" fill="#292524" opacity="0.15"/>
  <circle cx="102" cy="147" r="1" fill="#292524" opacity="0.15"/>
  <!-- Sun -->
  <circle cx="30" cy="30" r="18" fill="#fef08a" opacity="0.3"/>
  <circle cx="30" cy="30" r="12" fill="#fef08a" opacity="0.2"/>

  <!-- Right page - Text area -->
  <rect x="155" y="30" width="100" height="6" rx="3" fill="#bbf7d0" opacity="0.4"/>
  <rect x="155" y="50" width="110" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="62" width="105" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="74" width="95" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="86" width="108" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="98" width="90" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="110" width="100" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <rect x="155" y="122" width="85" height="4" rx="2" fill="#292524" opacity="0.07"/>
  <!-- Small flower decoration -->
  <circle cx="200" cy="160" r="4" fill="#f9a8d4" opacity="0.3"/>
  <circle cx="196" cy="157" r="2.5" fill="#f9a8d4" opacity="0.2"/>
  <circle cx="204" cy="157" r="2.5" fill="#f9a8d4" opacity="0.2"/>
  <circle cx="200" cy="160" r="2" fill="#fef08a" opacity="0.3"/>
</svg>