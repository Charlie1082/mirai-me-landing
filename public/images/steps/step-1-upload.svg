<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cd4fd"/>
      <stop offset="100%" stop-color="#a8e4ff"/>
    </linearGradient>
  </defs>
  <!-- Soft background circle -->
  <circle cx="50" cy="50" r="45" fill="#7cd4fd" opacity="0.1"/>
  <!-- Phone body -->
  <rect x="30" y="18" width="40" height="64" rx="8" ry="8" fill="url(#phoneGrad)" stroke="#7cd4fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Phone screen -->
  <rect x="34" y="26" width="32" height="48" rx="3" fill="#fefdfb"/>
  <!-- Photo icon on screen -->
  <rect x="40" y="34" width="20" height="16" rx="3" fill="#bbf7d0" opacity="0.5" stroke="#bbf7d0" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mountain in photo -->
  <path d="M42 48 L48 40 L52 45 L55 41 L58 48 Z" fill="#7cd4fd" opacity="0.6"/>
  <!-- Sun in photo -->
  <circle cx="54" cy="38" r="2.5" fill="#fef08a"/>
  <!-- Upload arrow -->
  <g stroke="#f9a8d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="50" y1="65" x2="50" y2="55"/>
    <polyline points="44,60 50,54 56,60"/>
  </g>
  <!-- Sparkle -->
  <g opacity="0.6">
    <line x1="22" y1="30" x2="22" y2="36" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="19" y1="33" x2="25" y2="33" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <circle cx="74" cy="28" r="3" fill="#e9d5ff" opacity="0.4"/>
</svg>