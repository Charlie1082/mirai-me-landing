<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="wandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>
  <!-- Soft background circle -->
  <circle cx="50" cy="50" r="45" fill="#e9d5ff" opacity="0.12"/>
  <!-- Magic wand -->
  <line x1="28" y1="72" x2="58" y2="32" stroke="url(#wandGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Wand tip -->
  <circle cx="58" cy="32" r="5" fill="#f9a8d4"/>
  <circle cx="58" cy="32" r="3" fill="#fefdfb"/>
  <!-- Big star at tip -->
  <polygon points="58,18 60,25 67,25 62,29 64,36 58,32 52,36 54,29 49,25 56,25" fill="#fef08a" opacity="0.9"/>
  <!-- Sparkles around -->
  <g opacity="0.7">
    <line x1="72" y1="22" x2="72" y2="30" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="68" y1="26" x2="76" y2="26" stroke="#fef08a" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.5">
    <line x1="44" y1="20" x2="44" y2="26" stroke="#e9d5ff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="41" y1="23" x2="47" y2="23" stroke="#e9d5ff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.6">
    <line x1="75" y1="42" x2="75" y2="48" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="72" y1="45" x2="78" y2="45" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Floating dots -->
  <circle cx="38" cy="38" r="2.5" fill="#f9a8d4" opacity="0.4"/>
  <circle cx="68" cy="50" r="2" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="48" cy="48" r="1.5" fill="#fef08a" opacity="0.5"/>
  <circle cx="65" cy="35" r="1.5" fill="#bbf7d0" opacity="0.4"/>
  <!-- AI text hint -->
  <text x="62" y="58" font-family="'Nunito', sans-serif" font-size="10" font-weight="700" fill="#e9d5ff" opacity="0.6">AI</text>
</svg>