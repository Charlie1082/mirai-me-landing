<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="giftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#7cd4fd"/>
    </linearGradient>
  </defs>
  <!-- Soft background circle -->
  <circle cx="50" cy="50" r="45" fill="#f9a8d4" opacity="0.08"/>
  <!-- Gift box bottom -->
  <rect x="24" y="48" width="52" height="32" rx="5" fill="url(#giftGrad)" opacity="0.6" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gift box lid -->
  <rect x="20" y="40" width="60" height="12" rx="4" fill="#7cd4fd" opacity="0.5" stroke="#7cd4fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ribbon vertical -->
  <rect x="46" y="40" width="8" height="40" rx="1" fill="#fef08a" opacity="0.7"/>
  <!-- Ribbon horizontal -->
  <rect x="20" y="43" width="60" height="6" rx="1" fill="#fef08a" opacity="0.7"/>
  <!-- Ribbon bow -->
  <ellipse cx="44" cy="36" rx="10" ry="7" fill="#fef08a" opacity="0.6" transform="rotate(-20, 44, 36)"/>
  <ellipse cx="56" cy="36" rx="10" ry="7" fill="#fef08a" opacity="0.6" transform="rotate(20, 56, 36)"/>
  <circle cx="50" cy="38" r="4" fill="#fef08a" opacity="0.8"/>
  <!-- Stars/sparkles around -->
  <g opacity="0.7">
    <polygon points="18,25 19.5,30 24.5,30 20.5,33 22,38 18,35 14,38 15.5,33 11.5,30 16.5,30" fill="#fef08a" opacity="0.6"/>
  </g>
  <g opacity="0.5">
    <line x1="78" y1="30" x2="78" y2="36" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="75" y1="33" x2="81" y2="33" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <circle cx="82" cy="55" r="2.5" fill="#bbf7d0" opacity="0.4"/>
  <circle cx="14" cy="50" r="2" fill="#e9d5ff" opacity="0.4"/>
  <!-- Heart -->
  <path d="M76,20 Q76,16 80,16 Q84,16 84,22 L80,26 L76,22 Z" fill="#f9a8d4" opacity="0.4"/>
</svg>