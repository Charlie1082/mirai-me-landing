<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fefdfb"/>
      <stop offset="100%" stop-color="#d6eaf8"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cd4fd"/>
      <stop offset="100%" stop-color="#a8e4ff"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cd4fd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e9d5ff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="magicGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8d4" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#e9d5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7cd4fd" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative clouds -->
  <g opacity="0.25">
    <ellipse cx="150" cy="80" rx="80" ry="30" fill="#7cd4fd"/>
    <ellipse cx="120" cy="72" rx="50" ry="25" fill="#a8e4ff"/>
    <ellipse cx="500" cy="60" rx="60" ry="24" fill="#7cd4fd"/>
    <ellipse cx="520" cy="54" rx="40" ry="20" fill="#a8e4ff"/>
    <ellipse cx="1050" cy="100" rx="70" ry="28" fill="#7cd4fd"/>
    <ellipse cx="1080" cy="92" rx="45" ry="22" fill="#a8e4ff"/>
  </g>

  <!-- Stars decoration -->
  <g opacity="0.7">
    <polygon points="100,180 104,192 116,192 106,200 110,212 100,204 90,212 94,200 84,192 96,192" fill="#fef08a"/>
    <polygon points="520,130 523,139 532,139 525,144 527,153 520,148 513,153 515,144 508,139 517,139" fill="#fef08a" opacity="0.6"/>
    <polygon points="280,100 282,106 288,106 283,110 285,116 280,112 275,116 277,110 272,106 278,106" fill="#fef08a" opacity="0.5"/>
    <polygon points="1100,200 1102,206 1108,206 1103,210 1105,216 1100,212 1095,216 1097,210 1092,206 1098,206" fill="#fef08a" opacity="0.6"/>
    <polygon points="650,80 652,86 658,86 653,90 655,96 650,92 645,96 647,90 642,86 648,86" fill="#fef08a" opacity="0.5"/>
  </g>

  <!-- Hearts decoration -->
  <g opacity="0.4">
    <path d="M180,280 Q180,268 192,268 Q204,268 204,282 L192,296 L180,282 Z" fill="#f9a8d4" transform="rotate(-15, 192, 282)"/>
    <path d="M460,160 Q460,150 470,150 Q480,150 480,162 L470,174 L460,162 Z" fill="#f9a8d4" opacity="0.5" transform="rotate(10, 470, 162)"/>
    <path d="M1050,350 Q1050,342 1058,342 Q1066,342 1066,352 L1058,362 L1050,352 Z" fill="#f9a8d4" opacity="0.5" transform="rotate(-8, 1058, 352)"/>
  </g>

  <!-- Small sparkles -->
  <g stroke="#fef08a" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="350" y1="140" x2="350" y2="150"/>
    <line x1="345" y1="145" x2="355" y2="145"/>
    <line x1="1140" y1="280" x2="1140" y2="290"/>
    <line x1="1135" y1="285" x2="1145" y2="285"/>
    <line x1="60" y1="350" x2="60" y2="360"/>
    <line x1="55" y1="355" x2="65" y2="355"/>
  </g>

  <!-- Floating bubbles -->
  <circle cx="200" cy="420" r="10" fill="#e9d5ff" opacity="0.25"/>
  <circle cx="550" cy="110" r="7" fill="#bbf7d0" opacity="0.3"/>
  <circle cx="420" cy="500" r="8" fill="#f9a8d4" opacity="0.2"/>
  <circle cx="1100" cy="450" r="9" fill="#7cd4fd" opacity="0.15"/>

  <!-- === LEFT SECTION: Logo and text === -->

  <!-- MIRAI-ME Logo -->
  <text x="80" y="260" font-family="'Rounded Mplus 1c', 'Nunito', sans-serif" font-size="72" font-weight="800" fill="url(#logoGrad)" letter-spacing="4">MIRAI</text>
  <line x1="363" y1="248" x2="377" y2="248" stroke="#e9d5ff" stroke-width="5" stroke-linecap="round"/>
  <text x="385" y="260" font-family="'Rounded Mplus 1c', 'Nunito', sans-serif" font-size="72" font-weight="800" fill="#f9a8d4" letter-spacing="4">ME</text>

  <!-- Tagline -->
  <text x="85" y="320" font-family="'Rounded Mplus 1c', 'Noto Sans JP', sans-serif" font-size="28" font-weight="500" fill="#292524" opacity="0.7" letter-spacing="2">未来のわたしに会いに行こう</text>

  <!-- Sparkle near logo -->
  <g opacity="0.6">
    <line x1="60" y1="220" x2="60" y2="235" stroke="#fef08a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="52" y1="227" x2="68" y2="227" stroke="#fef08a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g opacity="0.4">
    <polygon points="510,220 512,227 519,227 513,231 515,238 510,234 505,238 507,231 501,227 508,227" fill="#fef08a"/>
  </g>

  <!-- === RIGHT SECTION: Open book illustration === -->

  <!-- Glow behind book -->
  <circle cx="880" cy="280" r="200" fill="url(#glowGrad)"/>

  <!-- Open book -->
  <g filter="url(#softShadow)">
    <!-- Book spine shadow -->
    <ellipse cx="880" cy="430" rx="180" ry="15" fill="#292524" opacity="0.06"/>
    <!-- Left page -->
    <path d="M880 310 Q877 210 720 195 Q695 195 692 220 L692 400 Q692 418 712 418 L868 418 Q880 418 880 406 Z" fill="#fefdfb" stroke="#e9d5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M880 310 Q883 210 1040 195 Q1065 195 1068 220 L1068 400 Q1068 418 1048 418 L892 418 Q880 418 880 406 Z" fill="#fefdfb" stroke="#7cd4fd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Book spine -->
    <line x1="880" y1="205" x2="880" y2="418" stroke="#e9d5ff" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Page lines left -->
    <line x1="720" y1="260" x2="855" y2="260" stroke="#e9d5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="720" y1="285" x2="845" y2="285" stroke="#e9d5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="720" y1="310" x2="850" y2="310" stroke="#e9d5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="720" y1="335" x2="835" y2="335" stroke="#e9d5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
    <line x1="720" y1="360" x2="840" y2="360" stroke="#e9d5ff" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>

    <!-- Small illustration on right page -->
    <circle cx="980" cy="300" r="45" fill="#bbf7d0" opacity="0.3"/>
    <circle cx="965" cy="285" r="12" fill="#f9a8d4" opacity="0.4"/>
    <circle cx="995" cy="292" r="9" fill="#fef08a" opacity="0.4"/>
    <circle cx="975" cy="315" r="8" fill="#7cd4fd" opacity="0.3"/>
  </g>

  <!-- Magic rising from book - child silhouette -->
  <g opacity="0.85">
    <!-- Magic aura -->
    <ellipse cx="880" cy="180" rx="90" ry="110" fill="url(#magicGrad)"/>
    <!-- Child silhouette -->
    <g fill="#7cd4fd" opacity="0.7">
      <!-- Head -->
      <circle cx="880" cy="130" r="28"/>
      <!-- Body -->
      <path d="M860 155 Q854 182 852 205 Q852 218 880 218 Q908 218 908 205 Q906 182 900 155 Z"/>
      <!-- Arms reaching up -->
      <path d="M852 170 Q835 150 828 138" stroke="#7cd4fd" stroke-width="8" stroke-linecap="round" fill="none"/>
      <path d="M908 170 Q925 150 932 138" stroke="#7cd4fd" stroke-width="8" stroke-linecap="round" fill="none"/>
      <!-- Hair -->
      <path d="M858 115 Q852 96 865 90 Q880 86 895 90 Q908 96 902 115" fill="#7cd4fd"/>
      <path d="M898 105 Q915 96 920 112" fill="#7cd4fd" opacity="0.8"/>
    </g>
  </g>

  <!-- Stars around child -->
  <g opacity="0.75">
    <polygon points="810,100 813,110 823,110 815,116 818,126 810,120 802,126 805,116 797,110 807,110" fill="#fef08a"/>
    <polygon points="950,90 952,97 959,97 953,101 955,108 950,104 945,108 947,101 941,97 948,97" fill="#fef08a" opacity="0.6"/>
    <polygon points="830,160 831,164 835,164 832,167 833,171 830,168 827,171 828,167 825,164 829,164" fill="#fef08a" opacity="0.5"/>
    <polygon points="940,155 941,159 945,159 942,162 943,166 940,163 937,166 938,162 935,159 939,159" fill="#fef08a" opacity="0.5"/>
  </g>

  <!-- === BOTTOM TEXT === -->
  <text x="600" y="560" font-family="'Rounded Mplus 1c', 'Noto Sans JP', sans-serif" font-size="24" font-weight="400" fill="#292524" opacity="0.5" text-anchor="middle" letter-spacing="6">AI がつくる、世界にひとつの絵本</text>

  <!-- Bottom decorative flowers -->
  <g opacity="0.35">
    <circle cx="60" cy="580" r="8" fill="#f9a8d4"/>
    <circle cx="52" cy="572" r="5" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="68" cy="572" r="5" fill="#f9a8d4" opacity="0.6"/>
    <circle cx="60" cy="580" r="3.5" fill="#fef08a"/>
  </g>
  <g opacity="0.3">
    <circle cx="1140" cy="575" r="7" fill="#e9d5ff"/>
    <circle cx="1133" cy="568" r="4.5" fill="#e9d5ff" opacity="0.6"/>
    <circle cx="1147" cy="568" r="4.5" fill="#e9d5ff" opacity="0.6"/>
    <circle cx="1140" cy="575" r="3" fill="#fef08a"/>
  </g>
  <g opacity="0.25">
    <circle cx="600" cy="600" r="5" fill="#bbf7d0"/>
    <circle cx="595" cy="595" r="3" fill="#bbf7d0" opacity="0.6"/>
    <circle cx="605" cy="595" r="3" fill="#bbf7d0" opacity="0.6"/>
    <circle cx="600" cy="600" r="2" fill="#fef08a"/>
  </g>
</svg>