<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="fgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cd4fd"/>
      <stop offset="100%" stop-color="#a8e4ff"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="32" height="32" rx="6" fill="#fefdfb"/>

  <!-- Small open book icon -->
  <g>
    <!-- Left page -->
    <path d="M16 14 Q15.5 9 9 8 Q7.5 8 7.5 9.5 L7.5 22 Q7.5 23.5 9.5 23.5 L15 23.5 Q16 23.5 16 22.5 Z" fill="#fefdfb" stroke="url(#fgGrad)" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M16 14 Q16.5 9 23 8 Q24.5 8 24.5 9.5 L24.5 22 Q24.5 23.5 22.5 23.5 L17 23.5 Q16 23.5 16 22.5 Z" fill="#fefdfb" stroke="url(#fgGrad)" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="16" y1="9" x2="16" y2="23.5" stroke="#7cd4fd" stroke-width="0.8" opacity="0.5"/>
    <!-- Page lines -->
    <line x1="9.5" y1="14" x2="14.5" y2="14" stroke="#7cd4fd" stroke-width="0.6" opacity="0.3"/>
    <line x1="9.5" y1="16.5" x2="14" y2="16.5" stroke="#7cd4fd" stroke-width="0.6" opacity="0.3"/>
    <line x1="9.5" y1="19" x2="14.5" y2="19" stroke="#7cd4fd" stroke-width="0.6" opacity="0.3"/>
    <!-- Small illustration dot on right page -->
    <circle cx="20.5" cy="16" r="2.5" fill="#f9a8d4" opacity="0.35"/>
  </g>

  <!-- Small star top-right -->
  <polygon points="26,4 26.8,6.5 29,6.5 27.2,8 27.8,10.5 26,9 24.2,10.5 24.8,8 23,6.5 25.2,6.5" fill="#fef08a" opacity="0.7"/>

  <!-- Tiny sparkle top-left -->
  <g opacity="0.5">
    <line x1="5" y1="3" x2="5" y2="7" stroke="#7cd4fd" stroke-width="1" stroke-linecap="round"/>
    <line x1="3" y1="5" x2="7" y2="5" stroke="#7cd4fd" stroke-width="1" stroke-linecap="round"/>
  </g>
</svg>